<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl@2.27.0/dist/globe.gl.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>AI City Creator</h2>
            <div id="questions">
                <p>Welcome to City Game! I'm your AI assistant. Let's create your city.</p>
                <div id="question0">
                    <label for="cityname">What is the name of your city?</label>
                    <input type="text" id="cityname" required>
                    <button onclick="nextQuestion(0)">Next</button>
                </div>
                <div id="question1">
                    <label for="country">What country is your city in?</label>
                    <input type="text" id="country" required>
                    <button onclick="nextQuestion(1)">Next</button>
                </div>
                <div id="question2" style="display:none;">
                    <label for="population">What is the population size of your city? (e.g., 100000)</label>
                    <input type="number" id="population" required>
                    <button onclick="nextQuestion(2)">Next</button>
                </div>
                <div id="question3" style="display:none;">
                    <label for="area">What is the area of your city in square kilometers? (e.g., 500)</label>
                    <input type="number" id="area" required>
                    <button onclick="nextQuestion(3)">Next</button>
                </div>
                <div id="question4" style="display:none;">
                    <label for="transportation">On a scale of 1-10, how much transportation does your city have?</label>
                    <input type="number" id="transportation" min="1" max="10" required>
                    <button onclick="nextQuestion(4)">Next</button>
                </div>
                <div id="question5" style="display:none;">
                    <label for="safety">On a scale of 1-10, how much safety does your city have?</label>
                    <input type="number" id="safety" min="1" max="10" required>
                    <button onclick="nextQuestion(5)">Next</button>
                </div>
                <div id="question6" style="display:none;">
                    <label for="government">On a scale of 1-10, how much government does your city have?</label>
                    <input type="number" id="government" min="1" max="10" required>
                    <button onclick="nextQuestion(6)">Next</button>
                </div>
                <div id="question7" style="display:none;">
                    <label for="utilities">On a scale of 1-10, how much utilities does your city have?</label>
                    <input type="number" id="utilities" min="1" max="10" required>
                    <button onclick="generateCity()">Generate City</button>
                </div>
            </div>
            <div id="cityInfo" style="display:none;">
                <h3>Your City</h3>
                <p id="cityDesc"></p>
                <button onclick="simulateEvents()">Simulate Events</button>
            </div>
            <div id="events" style="display:none;">
                <h3>Historical Events</h3>
                <p id="eventDesc"></p>
            </div>
        </div>
        <div class="main">
            <div id="globe-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
    <button id="do-not-press" aria-label="do not press">do not press</button>

    <div id="prank-screen" aria-hidden="true" style="display:none;">
        <div class="prank-content">
            <img id="prank-image" src="images.jpeg" alt="prank image">
            <h1 id="prank-text">you fool</h1>
        </div>
    </div>

    <audio id="prank-audio" src="prank.mp3" preload="auto"></audio>
</body>
</html>
